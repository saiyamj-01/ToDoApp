<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link rel="stylesheet" href="ToDoDOM.css">
</head>
<body>
    <h1>ToDo App</h1>
    <div class="app">
        <div class="add">
            <input placeholder="Enter Your Task">
            <button>Add</button>
        </div>
        <div class="otherbtn">
            <button type="button" id="all">All</button>
            <button type="button" id="active">Active</button>
            <button type="button" id="completed">Completed</button>
        </div>
        <div class="list">
            <h2>List Of Tasks:- </h2>
            <ul>
                <!-- <li><input type="checkbox">Eat<button class="delete">Delete</button></li>
                <li><input type="checkbox">Sleep<button class="delete">Delete</button></li> -->
            </ul>
        </div>
    </div>
    <script src="ToDoDOM.js"></script>
</body>
</html>
